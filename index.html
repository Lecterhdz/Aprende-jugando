<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B9D">
  <title>KinderAula - Aprende Jugando 🎨</title>
  
  <!-- Fuentes amigables para niños -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  
  <!-- Estilos -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-loading" data-theme="claro">

  <!-- Login/Selección de Plan -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">🎨 KinderAula</div>
      <p class="auth-subtitle">Aprende jugando, crece sonriendo ✨</p>
      
      <div class="plan-cards">
        <button class="plan-card demo" onclick="auth.iniciarDemo()">
          <span class="plan-icon">🆓</span>
          <span class="plan-name">Demo</span>
          <span class="plan-duration">7 días</span>
        </button>
        <button class="plan-card basico" onclick="auth.mostrarPlanes()">
          <span class="plan-icon">🌟</span>
          <span class="plan-name">Básico</span>
          <span class="plan-duration">3 meses</span>
        </button>
        <button class="plan-card pro active" onclick="auth.mostrarPlanes()">
          <span class="plan-icon">🚀</span>
          <span class="plan-name">Pro</span>
          <span class="plan-duration">1 año</span>
        </button>
        <button class="plan-card elite" onclick="auth.mostrarPlanes()">
          <span class="plan-icon">👑</span>
          <span class="plan-name">Elite</span>
          <span class="plan-duration">1 año +</span>
        </button>
      </div>
      
      <button class="btn-toggle-theme" onclick="theme.toggle()">🌓 Tema</button>
    </div>
  </div>

  <!-- Layout Principal -->
  <div class="layout">
    
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">🎨 KinderAula</div>
        <button class="btn-close-sidebar" onclick="app.toggleSidebar()">✕</button>
      </div>
      
      <nav class="nav-menu">
        <button class="nav-item active" data-screen="dashboard">
          <span class="nav-icon">🏠</span> Inicio
        </button>
        <button class="nav-item" data-screen="repaso">
          <span class="nav-icon">🔄</span> Repaso
        </button>
        <button class="nav-item" data-screen="proyectos">
          <span class="nav-icon">🛠️</span> Proyectos
        </button>
        <button class="nav-item" data-screen="tareas">
          <span class="nav-icon">✏️</span> Tareas
        </button>
        <button class="nav-item" data-screen="sabias-que">
          <span class="nav-icon">💡</span> Sabías Que
        </button>
        <button class="nav-item" data-screen="progreso">
          <span class="nav-icon">⭐</span> Mi Progreso
        </button>
        <button class="nav-item padres-only" data-screen="padres">
          <span class="nav-icon">👨‍👩‍👧</span> Para Papás
        </button>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-info">
          <span class="user-avatar">🧒</span>
          <span class="user-name" id="user-name">Pequeño Explorador</span>
        </div>
        <button class="btn-logout" onclick="auth.cerrarSesion()">🚪 Salir</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      
      <!-- Topbar -->
      <header class="topbar">
        <button class="btn-hamburger" onclick="app.toggleSidebar()">☰</button>
        <h1 class="topbar-title" id="page-title">Dashboard</h1>
        <div class="topbar-actions">
          <button class="btn-theme" onclick="theme.toggle()">🌓</button>
          <button class="btn-profile" onclick="app.mostrarScreen('progreso')">⭐ <span id="stars-count">0</span></button>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content">
        
        <!-- Dashboard Screen -->
        <section id="dashboard-screen" class="screen active">
          <div class="welcome-banner">
            <h2>¡Hola, <span id="welcome-name">Explorador</span>! 👋</h2>
            <p>¿Qué quieres aprender hoy?</p>
          </div>
          
          <div class="quick-actions">
            <button class="action-card" onclick="app.mostrarScreen('tareas')">
              <span class="action-icon">✏️</span>
              <span class="action-label">Tareas de Hoy</span>
            </button>
            <button class="action-card" onclick="app.mostrarScreen('proyectos')">
              <span class="action-icon">🛠️</span>
              <span class="action-label">Nuevo Proyecto</span>
            </button>
            <button class="action-card" onclick="app.mostrarScreen('repaso')">
              <span class="action-icon">🔄</span>
              <span class="action-label">Repasar</span>
            </button>
            <button class="action-card" onclick="app.mostrarScreen('sabias-que')">
              <span class="action-icon">💡</span>
              <span class="action-label">Curiosidades</span>
            </button>
          </div>
          
          <div class="progress-section">
            <h3>🌟 Tu Progreso esta Semana</h3>
            <div class="progress-chart" id="weekly-progress"></div>
          </div>
        </section>

        <!-- Otras screens se cargarán dinámicamente -->
        <section id="repaso-screen" class="screen"></section>
        <section id="proyectos-screen" class="screen"></section>
        <section id="tareas-screen" class="screen"></section>
        <section id="sabias-que-screen" class="screen"></section>
        <section id="progreso-screen" class="screen"></section>
        <section id="padres-screen" class="screen"></section>

      </div>
    </main>
  </div>

  <!-- Overlay para sidebar en móvil -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="app.toggleSidebar()"></div>

  <!-- Toast Notification -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="src/core/theme.js"></script>
  <script src="src/core/auth.js"></script>
  <script src="src/core/storage.js"></script>
  <script src="src/core/app.js"></script>
  <script src="src/features/dashboard.js"></script>
  <!-- ... otros módulos ... -->
</body>
</html>
